[project]
name = "markitdown-fastapi"
version = "0.1.0"
description = "HTTP API for the full Microsoft MarkItDown source repository"
requires-python = "==3.12.*"
dependencies = [
    "fastapi[standard]",
    "python-multipart",
    "markitdown[pdf,docx,pptx,xlsx,xls,outlook]",
]

[tool.uv.sources]
markitdown = { path = "packages/markitdown", editable = true }

[tool.fastapi]
entrypoint = "main:app"